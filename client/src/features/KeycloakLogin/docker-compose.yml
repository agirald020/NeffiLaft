# C:\WORKSPACE\prueba-themes\docker-compose.yml
version: "3.8"

services:
  keycloak:
    build:
      context: .
      dockerfile: Dockerfile
    image: neffi/keycloak:local
    container_name: neffi-keycloak
    ports:
      - "8080:8080"
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
    networks:
      - neffi-network

networks:
  neffi-network:
    driver: bridge